<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SEB Password</title>
  <style>
    html, body { margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }
    body {
      display: flex; flex-direction: column; gap: 12px; justify-content: center;
      padding: 20px; box-sizing: border-box; background: #1b2029; color: #e7edf5;
    }
    .msg { font-size: 13px; line-height: 1.4; color: #c3ccd8; }
    input {
      font-size: 14px; padding: 8px 10px; border-radius: 6px; border: 1px solid #3a4658;
      background: #10151d; color: #fff; outline: none;
    }
    input:focus { border-color: #5b8cff; }
    .row { display: flex; gap: 8px; justify-content: flex-end; }
    button {
      font-size: 13px; padding: 7px 14px; border-radius: 6px; border: 1px solid #3a4658;
      background: #2a3342; color: #e7edf5; cursor: pointer;
    }
    button.primary { background: #3b6ef0; border-color: #3b6ef0; color: #fff; }
    button:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div class="msg" id="msg">Enter the password:</div>
  <input id="pw" type="password" autofocus />
  <div class="row">
    <button id="cancel">Cancel</button>
    <button id="ok" class="primary">Open</button>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    const params = new URLSearchParams(location.search);
    document.getElementById('msg').textContent = params.get('m') || 'Enter the password:';
    const pw = document.getElementById('pw');
    function submit() { ipcRenderer.send('seb:password-result', pw.value); }
    function cancel() { ipcRenderer.send('seb:password-result', null); }
    document.getElementById('ok').addEventListener('click', submit);
    document.getElementById('cancel').addEventListener('click', cancel);
    pw.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submit();
      else if (e.key === 'Escape') cancel();
    });
    window.addEventListener('DOMContentLoaded', () => pw.focus());
  </script>
</body>
</html>
